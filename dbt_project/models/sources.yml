version: 2

sources:
  - name: northwind_db
    database: northwind_db
    schema: northwind_db
    tables:
      - name: raw_orders
        description: "Tabela raw de pedidos proveniente do S3"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null

      - name: raw_order_details
        description: "Tabela raw de detalhes dos pedidos"
        columns:
          - name: order_id
            tests:
              - not_null
              - relationships:
                  to: source('northwind_db', 'raw_orders')
                  field: order_id
          - name: product_id
            tests:
              - not_null
